name: rollbar_dart
description: Connect your Dart applications to Rollbar for error reporting.
version: 1.3.1
homepage: https://www.rollbar.com
documentation: https://docs.rollbar.com/docs/flutter#dart
repository: https://github.com/rollbar/rollbar-flutter

environment:
 sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.3.0
  meta: ^1.15.0
  sqlite3: ^2.7.4
  collection: ^1.19.0
  stack_trace: ^1.12.0
  rollbar_common: ^1.1.0

dependency_overrides:
  rollbar_common:
    path: ../rollbar_common

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.15
  build_runner: ^2.4.15
  mockito: ^5.4.5
  pubspec_parse: ^1.5.0
